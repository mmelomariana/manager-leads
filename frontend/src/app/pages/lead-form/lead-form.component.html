<div class="form-container">
  <mat-toolbar color="primary" class="header-toolbar">
    <span>{{ isEdit ? 'Editar Lead' : 'Novo Lead' }}</span>
    <span class="spacer"></span>
    <button 
      mat-icon-button 
      (click)="onCancel()" 
      class="btn-back"
      aria-label="Voltar">
      <mat-icon>arrow_back</mat-icon>
    </button>
  </mat-toolbar>

  <mat-card class="lead-form-card">
    <mat-card-content>
      <form [formGroup]="leadForm" (ngSubmit)="onSubmit()" class="lead-form">
        
        <!-- Campo Nome -->
        <mat-form-field appearance="outline" class="form-field-full">
          <mat-label>Nome *</mat-label>
          <input 
            matInput 
            type="text" 
            formControlName="name" 
            placeholder="Digite o nome do lead">
          <mat-icon matSuffix>person</mat-icon>
          
          <mat-error *ngIf="name?.invalid && name?.touched">
            <span *ngIf="name?.errors?.['required']">Nome é obrigatório</span>
            <span *ngIf="name?.errors?.['minlength']">Nome deve ter pelo menos 3 caracteres</span>
          </mat-error>
        </mat-form-field>

        <!-- Campo Email -->
        <mat-form-field appearance="outline" class="form-field-full">
          <mat-label>Email *</mat-label>
          <input 
            matInput 
            type="email" 
            formControlName="email" 
            placeholder="Digite o email do lead">
          <mat-icon matSuffix>email</mat-icon>
          
          <mat-error *ngIf="email?.invalid && email?.touched">
            <span *ngIf="email?.errors?.['required']">Email é obrigatório</span>
            <span *ngIf="email?.errors?.['email']">Digite um email válido</span>
          </mat-error>
        </mat-form-field>

        <!-- Campo Status -->
        <mat-form-field appearance="outline" class="form-field-full">
          <mat-label>Status</mat-label>
          <mat-select formControlName="status">
            <mat-option value="New">Novo</mat-option>
            <mat-option value="Qualified">Qualificado</mat-option>
            <mat-option value="Won">Ganho</mat-option>
            <mat-option value="Lost">Perdido</mat-option>
          </mat-select>
          <mat-icon matSuffix>flag</mat-icon>
        </mat-form-field>

        <!-- Ações do Formulário -->
        <div class="form-actions">
          <button 
            type="button" 
            mat-stroked-button 
            color="warn" 
            (click)="onCancel()"
            class="btn-cancel">
            Cancelar
          </button>
          
          <button 
            type="submit" 
            mat-raised-button 
            color="primary" 
            [disabled]="leadForm.invalid || isLoading"
            class="btn-submit">
            <mat-spinner diameter="20" *ngIf="isLoading" class="button-spinner"></mat-spinner>
            <span *ngIf="!isLoading">
              {{ isEdit ? 'Atualizar' : 'Criar' }}
            </span>
            <span *ngIf="isLoading">
              {{ isEdit ? 'Atualizando...' : 'Criando...' }}
            </span>
          </button>
        </div>

      </form>
    </mat-card-content>
  </mat-card>
</div>
